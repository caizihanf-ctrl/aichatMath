<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math AI Chat</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        :root {
            --bg-color: #f4f6fb;
            --panel-color: #2c3e50;
            --panel-muted: #34495e;
            --primary-color: #3d7bd9;
            --primary-dark: #2764ba;
            --toolbar-bg: #eef2f5;
            --border-color: #d1d5db;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .settings-header {
            background: var(--panel-color);
            color: white;
            padding: 10px 15px;
            font-size: 0.92rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .settings-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .settings-panel {
            background: var(--panel-muted);
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid #4a6278;
            flex-shrink: 0;
            max-height: 54vh;
            overflow-y: auto;
        }

        .settings-panel.show {
            display: flex;
        }

        .settings-row {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 220px;
        }

        .settings-group label {
            color: #dbeafe;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .settings-panel input,
        .settings-panel textarea {
            background: var(--panel-color);
            border: 1px solid #5dade2;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .settings-panel input[type="checkbox"] {
            width: 16px;
            height: 16px;
            min-width: 16px;
            padding: 0;
            accent-color: var(--primary-color);
        }

        .checkbox-label {
            color: #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.84rem;
            font-weight: 700;
            min-height: 38px;
        }

        .settings-panel textarea {
            min-height: 76px;
            resize: vertical;
            line-height: 1.45;
        }

        .settings-panel input::placeholder,
        .settings-panel textarea::placeholder {
            color: #b7c9d8;
        }

        .setting-note {
            color: #cbd5e1;
            font-size: 0.75rem;
            line-height: 1.35;
        }

        .model-selector-group {
            position: relative;
            display: flex;
            flex: 1;
            min-width: 220px;
        }

        .model-selector-group input {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: 0;
            width: 100%;
        }

        .model-list-btn {
            background: #2980b9;
            border: 1px solid #5dade2;
            color: white;
            padding: 0 12px;
            cursor: pointer;
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
            min-width: 42px;
        }

        .model-list-btn:hover {
            background: #3498db;
        }

        .model-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--panel-color);
            border: 1px solid #5dade2;
            border-radius: 4px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.28);
            margin-top: 2px;
        }

        .model-dropdown.show {
            display: block;
        }

        .model-option {
            padding: 8px 12px;
            color: #ecf0f1;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #34495e;
        }

        .model-option:hover {
            background: #3c5870;
            color: #dff2ff;
        }

        .model-option.loading {
            text-align: center;
            color: #bdc3c7;
            cursor: default;
        }

        .model-option.error {
            color: #fecaca;
            font-size: 0.8rem;
            cursor: default;
        }

        .action-btn {
            padding: 8px 13px;
            min-height: 38px;
            color: white;
            border: 0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .save-btn {
            background: #238457;
        }

        .save-btn:hover {
            background: #2aa96d;
        }

        .export-btn {
            background: #ce6f18;
        }

        .export-btn:hover {
            background: #b85f0f;
        }

        .autosave-btn {
            background: #7f3a98;
        }

        .autosave-btn:hover {
            background: #9145ad;
        }

        .autosave-btn.active {
            background: #238457;
        }

        .import-btn {
            background: #118270;
        }

        .import-btn:hover {
            background: #159c88;
        }

        .sync-btn {
            background: #3366a8;
        }

        .sync-btn:hover {
            background: #3e78c4;
        }

        .danger-btn {
            background: #a33a3a;
        }

        .danger-btn:hover {
            background: #bf4646;
        }

        .status-indicator {
            font-size: 0.8rem;
            color: #bdc3c7;
            display: inline-flex;
            align-items: center;
            min-height: 18px;
        }

        .status-indicator.recording {
            color: #86efac;
        }

        .app-main {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        .conversation-sidebar {
            width: 280px;
            min-width: 240px;
            max-width: 34vw;
            background: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .conversation-sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .conversation-sidebar-title {
            color: #1f2937;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .conversation-actions {
            display: flex;
            gap: 8px;
        }

        .side-btn {
            flex: 1;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #334155;
            border-radius: 6px;
            min-height: 34px;
            cursor: pointer;
            font-weight: 700;
        }

        .side-btn:hover {
            background: #eef2f7;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .conversation-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
            padding: 9px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
            cursor: pointer;
        }

        .conversation-item:hover {
            background: #f8fafc;
        }

        .conversation-item.active {
            border-color: var(--primary-color);
            background: #eef6ff;
        }

        .conversation-item-title {
            color: #111827;
            font-size: 0.9rem;
            font-weight: 750;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .conversation-item-meta {
            color: var(--text-muted);
            font-size: 0.74rem;
            grid-column: 1 / -1;
        }

        .conversation-delete {
            width: 24px;
            height: 24px;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }

        .conversation-delete:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        .conversation-empty {
            color: var(--text-muted);
            font-size: 0.84rem;
            line-height: 1.5;
            padding: 12px;
        }

        #chat-container {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: min(92%, 900px);
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background: white;
            color: #263238;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .message.system {
            align-self: center;
            background: #fff7ed;
            color: #9a3412;
            border: 1px solid #fed7aa;
            max-width: min(92%, 720px);
        }

        .message.ai pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .message.ai p {
            margin: 0 0 8px 0;
        }

        .message.ai p:last-child {
            margin: 0;
        }

        .message-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .message-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        .message.ai .message-image {
            border-color: var(--border-color);
        }

        .bottom-section {
            background: white;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .math-preview-area {
            background: #fffdf5;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 15px;
            font-size: 0.9rem;
            color: #555;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }

        .math-preview-area.show {
            display: block;
        }

        .math-preview-area p {
            margin: 0;
        }

        .attachment-tray {
            display: none;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid #e5e7eb;
            overflow-x: auto;
            background: #f8fafc;
        }

        .attachment-tray.show {
            display: flex;
        }

        .attachment-thumb {
            position: relative;
            width: 70px;
            height: 70px;
            flex: 0 0 auto;
        }

        .attachment-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            display: block;
        }

        .attachment-thumb button {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 50%;
            background: #1f2937;
            color: white;
            cursor: pointer;
            line-height: 1;
        }

        .math-toolbar-container {
            background: var(--toolbar-bg);
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .math-toolbar-row {
            display: flex;
            gap: 8px;
            padding: 6px 10px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .math-toolbar-row:first-child {
            border-bottom: 1px solid #e2e8f0;
        }

        .math-toolbar-row::-webkit-scrollbar {
            display: none;
        }

        .math-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-family: Consolas, "Times New Roman", serif;
            cursor: pointer;
            user-select: none;
            color: #334155;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
        }

        .math-btn:active {
            background: #e2e8f0;
            transform: translateY(1px);
        }

        .input-area {
            display: flex;
            padding: 10px;
            gap: 10px;
            align-items: flex-end;
            background: white;
        }

        #attach-btn {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            color: #334155;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            font-weight: 800;
            font-size: 1.1rem;
        }

        #attach-btn:hover {
            background: #eef2f7;
        }

        textarea#user-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            height: 44px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            color: #111827;
        }

        textarea#user-input:focus {
            border-color: var(--primary-color);
        }

        button#send-btn {
            background: var(--primary-color);
            color: white;
            border: 0;
            padding: 0 20px;
            height: 44px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }

        button#send-btn:hover {
            background: var(--primary-dark);
        }

        button#send-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .app-main {
                flex-direction: column;
            }

            .conversation-sidebar {
                width: 100%;
                max-width: none;
                min-width: 0;
                max-height: 34vh;
                border-right: 0;
                border-bottom: 1px solid var(--border-color);
            }

            .conversation-sidebar-header {
                padding: 10px;
            }

            .settings-group {
                min-width: 100%;
            }

            .settings-row {
                gap: 8px;
            }

            .message {
                max-width: 96%;
            }

            button#send-btn {
                padding: 0 14px;
            }
        }
    </style>
</head>

<body>
    <div class="settings-header" onclick="toggleSettings()">
        <div class="settings-title">
            <span>设置与同步</span>
            <span id="autosave-status" class="status-indicator"></span>
        </div>
        <span id="toggle-icon">▼</span>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-row">
            <div class="settings-group">
                <label for="api-url">默认 API 地址</label>
                <input type="text" id="api-url" placeholder="https://api.openai.com/v1">
            </div>
            <div class="settings-group">
                <label for="api-key">默认 API Key</label>
                <input type="password" id="api-key" placeholder="sk-...">
            </div>
            <div class="settings-group">
                <label for="model-name">默认模型</label>
                <div class="model-selector-group">
                    <input type="text" id="model-name" placeholder="gpt-4o, deepseek-chat">
                    <button class="model-list-btn" onclick="fetchAndShowModels(event)" title="获取模型列表">▼</button>
                    <div id="model-dropdown" class="model-dropdown"></div>
                </div>
            </div>
        </div>

        <div class="settings-row">
            <div class="settings-group">
                <label for="api-list">多 API 轮询列表</label>
                <textarea id="api-list" placeholder="每行一个：API地址 | API Key | 模型(可选)&#10;https://api.openai.com/v1 | sk-xxx | gpt-4o&#10;https://api.deepseek.com/v1 | sk-yyy | deepseek-chat"></textarea>
                <div class="setting-note">发送时按轮询顺序选择接口；当前接口失败会自动尝试下一行。留空则使用上面的默认 API。</div>
            </div>
        </div>

        <div class="settings-row">
            <div class="settings-group">
                <label for="nutstore-url">坚果云 WebDAV 中转地址</label>
                <input type="text" id="nutstore-url" placeholder="https://zihancai.top/dav/">
            </div>
            <div class="settings-group">
                <label for="nutstore-user">坚果云账号</label>
                <input type="text" id="nutstore-user" placeholder="你的坚果云登录邮箱">
            </div>
            <div class="settings-group">
                <label for="nutstore-pass">坚果云应用密码</label>
                <input type="password" id="nutstore-pass" placeholder="坚果云第三方应用密码">
            </div>
            <div class="settings-group">
                <label for="nutstore-path">同步文件路径</label>
                <input type="text" id="nutstore-path" placeholder="/MathAIChat/chat.json">
            </div>
        </div>

        <div class="setting-note">
            当前默认通过 zihancai.top 的 nginx WebDAV 反代与坚果云同步；坚果云账号和应用密码仍填写原来的坚果云凭据。
        </div>

        <div class="settings-row">
            <label class="checkbox-label">
                <input type="checkbox" id="nutstore-auto">
                启用坚果云自动同步
            </label>
            <button class="action-btn save-btn" onclick="saveSettings()">保存配置</button>
            <button class="action-btn sync-btn" onclick="useNutstoreProxy()">使用中转服务器</button>
            <button id="btn-autosave" class="action-btn autosave-btn" onclick="setupAutoSave()">启用本地自动保存</button>
            <input type="file" id="import-file" accept=".json,application/json" style="display:none" onchange="handleFileImport(this)">
            <button class="action-btn import-btn" onclick="document.getElementById('import-file').click()">加载对话</button>
            <button class="action-btn export-btn" onclick="exportChat()">导出对话</button>
            <button class="action-btn sync-btn" onclick="testNutstoreConnection()">检测坚果云连接</button>
            <button class="action-btn sync-btn" onclick="syncFromNutstore()">从坚果云拉取</button>
            <button class="action-btn sync-btn" onclick="syncToNutstore()">同步到坚果云</button>
            <button class="action-btn danger-btn" onclick="clearConversation()">清空当前对话</button>
        </div>
    </div>

    <div class="app-main">
        <aside class="conversation-sidebar">
            <div class="conversation-sidebar-header">
                <div class="conversation-sidebar-title">已保存对话</div>
                <div class="conversation-actions">
                    <button class="side-btn" onclick="newConversation()">新建</button>
                    <button class="side-btn" onclick="saveCurrentConversation()">保存当前</button>
                </div>
            </div>
            <div id="conversation-list" class="conversation-list"></div>
        </aside>

        <div id="chat-container"></div>
    </div>

    <div class="bottom-section">
        <div id="math-preview" class="math-preview-area"></div>
        <div id="attachment-tray" class="attachment-tray"></div>

        <div class="math-toolbar-container">
            <div class="math-toolbar-row" id="math-toolbar-basic"></div>
            <div class="math-toolbar-row" id="math-toolbar-funcs"></div>
        </div>

        <div class="input-area">
            <input type="file" id="image-input" accept="image/*" multiple style="display:none" onchange="handleImageUpload(this)">
            <button id="attach-btn" onclick="document.getElementById('image-input').click()" title="上传图片">+</button>
            <textarea id="user-input" placeholder="输入数学问题..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            apiUrl: 'api_url',
            apiKey: 'api_key',
            modelName: 'model_name',
            apiList: 'api_list',
            conversation: 'math_chat_conversation_v2',
            conversations: 'math_chat_saved_conversations_v1',
            activeConversationId: 'math_chat_active_conversation_id',
            apiIndex: 'math_chat_api_index',
            nutstoreUrl: 'nutstore_url',
            nutstoreUser: 'nutstore_user',
            nutstorePass: 'nutstore_pass',
            nutstorePath: 'nutstore_path',
            nutstoreAuto: 'nutstore_auto_sync'
        };

        const defaultUrl = 'https://api.openai.com/v1';
        const defaultModel = 'gpt-4o';
        const directNutstoreUrl = 'https://dav.jianguoyun.com/dav/';
        const legacyProxyNutstoreUrl = 'http://47.237.92.156/dav/';
        const proxyNutstoreHost = 'zihancai.top';
        const proxyNutstorePath = '/dav/';
        const proxyNutstoreUrl = getProxyNutstoreUrl();
        const defaultNutstoreUrl = proxyNutstoreUrl;
        const defaultNutstorePath = '/MathAIChat/chat.json';
        const maxImageBytes = 8 * 1024 * 1024;

        const basicSymbols = [
            { label: '+', insert: '+', offset: 0 },
            { label: '-', insert: '-', offset: 0 },
            { label: '*', insert: '*', offset: 0 },
            { label: '/', insert: '/', offset: 0 },
            { label: '=', insert: '=', offset: 0 },
            { label: '\'', insert: '\'', offset: 0 },
            { label: '%', insert: '%', offset: 0 },
            { label: '(', insert: '(', offset: 0 },

        function insertSymbol(text, offsetBack)
        {
            const start = userInput.selectionStart;
            const end = userInput.selectionEnd;
            const value = userInput.value;
            userInput.value = value.substring(0, start) + text + value.substring(end);
            const newPos = start + text.length - offsetBack;
            userInput.setSelectionRange(newPos, newPos);
            userInput.focus();
            userInput.dispatchEvent(new Event('input'));

        async function setupAutoSave()
        {
            if (!('showDirectoryPicker' in window))
            {
                alert('您的浏览器不支持文件系统访问 API。请使用 Chrome/Edge 桌面版。');
                return;
            }

            try
            {
                const dirHandle = await window.showDirectoryPicker();
                const fileName = `chat_${formatTimestamp(new Date())}.json`;
                fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
                isAutoSaveActive = true;
                const btn = document.getElementById('btn-autosave');
                btn.textContent = `正在保存：${fileName}`;
                btn.classList.add('active');
                setStatus('正在记录', 'recording');
                await writeToFile();
            } catch (err)
            {
                if (err.name !== 'AbortError')
                {
                    console.error(err);
                    alert('设置自动保存失败: ' + err.message);
                }
            }
        }

        async function writeToFile()
        {
            if (!fileHandle || !isAutoSaveActive) return;
            try
            {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(buildConversationPayload(), null, 2));
                await writable.close();
            } catch (err)
            {
                console.error('自动保存写入失败:', err);
                setStatus('保存失败');
            }
        }

        function loadConversationFromCache()
        {
            migrateLegacyConversation();
            renderConversationList();
            const saved = getSavedConversations();
            const active = saved.find((item) => item.id === currentConversationId) || saved[0];
            if (active)
            {
                currentConversationId = active.id;
                localStorage.setItem(STORAGE_KEYS.activeConversationId, currentConversationId);
                messageHistory = active.messages.map((msg) => ({ role: msg.role, content: cloneContent(msg.content) }));
                renderConversation();
                renderConversationList();
                return;
            }

            const raw = localStorage.getItem(STORAGE_KEYS.conversation);
            if (!raw)
            {
                currentConversationId = createConversationId();
                localStorage.setItem(STORAGE_KEYS.activeConversationId, currentConversationId);
                renderGreeting();
                renderConversationList();
                return;
            }

            try
            {
                const messages = parseConversationPayload(JSON.parse(raw));
                if (messages.length)
                {
                    restoreConversation(messages, { silent: true });
                    return;
                }
            } catch (err)
            {
                console.warn('本地缓存对话加载失败:', err);
            }

            renderGreeting();
            renderConversationList();
        }

                const parsed = JSON.parse(localStorage.getItem(STORAGE_KEYS.conversations) || '[]');
                return Array.isArray(parsed) ? parsed.filter((item) => item && item.id && Array.isArray(item.messages)) : [];
            } catch (err)
            {
                console.warn('保存对话列表读取失败:', err);
                return [];

        function saveConversationToLibrary()
        {
            if (!currentConversationId)
            {
                currentConversationId = createConversationId();
                localStorage.setItem(STORAGE_KEYS.activeConversationId, currentConversationId);
            }

            const conversations = getSavedConversations();
            const now = new Date().toISOString();
            const existing = conversations.find((item) => item.id === currentConversationId);
            const record = {
                id: currentConversationId,
                title: getConversationTitle(messageHistory),
                createdAt: existing?.createdAt || now,
                updatedAt: now,
                messages: messageHistory.map((msg) => ({ role: msg.role, content: cloneContent(msg.content) }))
            };

            const next = [record, ...conversations.filter((item) => item.id !== currentConversationId)]
                .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
                .slice(0, 80);
            setSavedConversations(next);
            renderConversationList();
        }

        function migrateLegacyConversation()
        {
            const saved = getSavedConversations();
            if (saved.length) return;
            const raw = localStorage.getItem(STORAGE_KEYS.conversation);
            if (!raw) return;

            try
            {
                const messages = parseConversationPayload(JSON.parse(raw));
                if (!messages.length) return;
                currentConversationId = currentConversationId || createConversationId();
                localStorage.setItem(STORAGE_KEYS.activeConversationId, currentConversationId);
                setSavedConversations([{
                    id: currentConversationId,
                    title: getConversationTitle(messages),
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    messages
                }]);
            } catch (err)
            {
                console.warn('旧对话迁移失败:', err);

        function handleFileImport(input)
        {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) =>
            {
                try
                {
                    const payload = JSON.parse(event.target.result);
                    const loadedHistory = parseConversationPayload(payload);
                    if (!loadedHistory.length)
                    {
                        throw new Error('文件中没有可加载的对话消息');
                    }
                    restoreConversation(loadedHistory);
                    alert(`成功加载 ${loadedHistory.length} 条消息`);
                } catch (err)
                {
                    alert('加载失败: ' + err.message);
                } finally
                {
                    input.value = '';
                }
            };
            reader.onerror = () =>
            {
                alert('读取文件失败');
                input.value = '';
            };
            reader.readAsText(file, 'utf-8');
        }

        function parseConversationPayload(payload)
        {
            const source = Array.isArray(payload)
                ? payload
                : (payload?.messages || payload?.messageHistory || payload?.history || []);

            if (!Array.isArray(source))
            {
                throw new Error('文件格式错误：未找到 messages 数组');
            }

            return source
                .map(normalizeMessage)
                .filter(Boolean);
        }

        function normalizeMessage(msg)
        {
            if (!msg || typeof msg !== 'object') return null;
            const roleMap = { ai: 'assistant', bot: 'assistant', assistant: 'assistant', user: 'user', system: 'system' };
            const role = roleMap[msg.role] || 'user';
            const normalized = normalizeContent(msg.content ?? msg.text ?? '');
            if (typeof normalized === 'string' && normalized.length === 0) return null;
            if (Array.isArray(normalized) && normalized.length === 0) return null;
            return { role, content: normalized };
        }

        function normalizeContent(content)
        {
            if (typeof content === 'string') return content;
            if (!Array.isArray(content))
            {
                return typeof content === 'undefined' || content === null ? '' : String(content);
            }

            const parts = [];
            content.forEach((part) =>
            {
                if (!part) return;
                if (typeof part === 'string')
                {
                    parts.push({ type: 'text', text: part });
                    return;
                }
                if (part.type === 'text')
                {
                    parts.push({ type: 'text', text: String(part.text || '') });
                    return;
                }
                if (part.type === 'image_url')
                {
                    const url = typeof part.image_url === 'string' ? part.image_url : part.image_url?.url;
                    if (url) parts.push({ type: 'image_url', image_url: { url } });
                    return;
                }
                if (part.type === 'image' || part.dataUrl)
                {
                    const url = part.dataUrl || part.url || part.src;
                    if (url) parts.push({ type: 'image_url', image_url: { url } });
                }
            });
            return parts;
        }

        function restoreConversation(messages, options = {})
        {
            if (!options.keepCurrentId)
            {
                currentConversationId = options.id || createConversationId();
                localStorage.setItem(STORAGE_KEYS.activeConversationId, currentConversationId);
            }
            messageHistory = messages.map((msg) => ({ role: msg.role, content: cloneContent(msg.content) }));
            renderConversation();
            persistConversation();
            if (!options.silent) setStatus('对话已加载', 'recording');
        }

        function cloneContent(content)
        {
            if (typeof content === 'undefined') return '';
            return JSON.parse(JSON.stringify(content));
        }

        function renderConversation()
        {
            chatContainer.innerHTML = '';
            if (!messageHistory.length)
            {
                renderGreeting();
                return;
            }
            messageHistory.forEach((msg) => appendMessage(msg.role, msg.content));
            typesetElement(chatContainer);
        }

        function exportChat()
        {
            if (!messageHistory.length)
            {
                alert('暂无对话记录可导出');
                return;
            }

            const dataStr = JSON.stringify(buildConversationPayload(), null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `math_chat_export_${formatTimestamp(new Date())}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        {

            messageHistory = [];

        function getApiConfigs()
        {
            const apiList = document.getElementById('api-list').value.trim();
            const globalModel = document.getElementById('model-name').value.trim() || defaultModel;
            const configs = [];

            if (apiList)
            {
                apiList.split(/\r?\n/)
                    .map((line) => line.trim())
                    .filter((line) => line && !line.startsWith('#'))
                    .forEach((line) =>
                    {
                        const parts = line.includes('|')
                            ? line.split('|').map((part) => part.trim())
                            : line.split(',').map((part) => part.trim());
                        const [url, key, model] = parts;
                        if (url && key)
                        {
                            configs.push({
                                url: normalizeChatUrl(url),
                                key,
                                model: model || globalModel
                            });
                        }
                    });
            }

            if (!configs.length)
            {
                const url = document.getElementById('api-url').value.trim() || defaultUrl;
                const key = document.getElementById('api-key').value.trim();
                if (key)
                {
                    configs.push({
                        url: normalizeChatUrl(url),
                        key,
                        model: globalModel
                    });
                }
            }

            return configs;
        }

        function normalizeChatUrl(url)
        {
            let apiUrl = (url || defaultUrl).trim();
            if (apiUrl.endsWith('/')) apiUrl = apiUrl.slice(0, -1);
            if (!apiUrl.endsWith('/chat/completions')) apiUrl += '/chat/completions';
            return apiUrl;
        }

        async function fetchAndShowModels(event)
        {
            event.stopPropagation();
            const dropdown = document.getElementById('model-dropdown');
            const configs = getApiConfigs();
            const config = configs[apiRoundRobinIndex % Math.max(configs.length, 1)] || configs[0];

            if (dropdown.classList.contains('show'))
            {
                dropdown.classList.remove('show');
                return;
            }

            if (!config)
            {
                alert('请先填写 API Key 或多 API 轮询列表');
                return;
            }

            dropdown.classList.add('show');
            dropdown.innerHTML = '<div class="model-option loading">正在获取模型列表...</div>';

            try
            {
                const modelsUrl = config.url.replace(/\/chat\/completions$/, '/models');
                const response = await fetch(modelsUrl, {
                    method: 'GET',
                    headers: {
                        Authorization: `Bearer ${config.key}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const models = Array.isArray(data.data) ? data.data : (Array.isArray(data) ? data : []);
                models.sort((a, b) => String(a.id).localeCompare(String(b.id)));
                dropdown.innerHTML = '';

                if (!models.length)
                {
                    dropdown.innerHTML = '<div class="model-option error">未找到模型</div>';
                    return;
                }

                models.forEach((model) =>
                {
                    const div = document.createElement('div');
                    div.className = 'model-option';
                    div.textContent = model.id;
                    div.onclick = () =>
                    {
                        document.getElementById('model-name').value = model.id;
                        dropdown.classList.remove('show');
                    };
                    dropdown.appendChild(div);
                });
            } catch (error)
            {
                dropdown.innerHTML = `<div class="model-option error">获取失败: ${escapeHtml(error.message)}<br>请检查 URL 和 Key</div>`;
            }
        }

        userInput.addEventListener('input', function ()
        {
            this.style.height = 'auto';
            this.style.height = `${this.scrollHeight}px`;
            if (this.value === '') this.style.height = '44px';
            updatePreview();
        });

        userInput.addEventListener('keydown', function (event)
        {
            if (event.key === 'Enter' && !event.shiftKey)
            {
                event.preventDefault();
                sendMessage();
            }
        });

        const updatePreview = debounce(function ()
        {
            const text = userInput.value;
            if (!text.trim())
            {
                previewArea.classList.remove('show');
                previewArea.innerHTML = '';
                return;
            }
            previewArea.classList.add('show');
            previewArea.innerHTML = sanitizeHtml(renderMarkdown(text));
            typesetElement(previewArea);
        }, 250);

        async function handleImageUpload(input)
        {
            const files = Array.from(input.files || []);
            if (!files.length) return;

            for (const file of files)
            {
                if (!file.type.startsWith('image/'))
                {
                    alert(`${file.name} 不是图片文件`);
                    continue;
                }
                if (file.size > maxImageBytes)
                {
                    alert(`${file.name} 超过 8MB，已跳过`);
                    continue;
                }
                const dataUrl = await readFileAsDataUrl(file);
                pendingImages.push({
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    dataUrl
                });
            }
            input.value = '';
            renderAttachmentTray();
        }

        function readFileAsDataUrl(file)
        {
            return new Promise((resolve, reject) =>
            {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error || new Error('图片读取失败'));
                reader.readAsDataURL(file);
            });
        }

        function renderAttachmentTray()
        {
            attachmentTray.innerHTML = '';
            attachmentTray.classList.toggle('show', pendingImages.length > 0);
            pendingImages.forEach((image, index) =>
            {
                const item = document.createElement('div');
                item.className = 'attachment-thumb';
                const img = document.createElement('img');
                img.src = image.dataUrl;
                img.alt = image.name || `图片 ${index + 1}`;
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.textContent = '×';
                removeBtn.title = '移除图片';
                removeBtn.onclick = () =>
                {
                    pendingImages.splice(index, 1);
                    renderAttachmentTray();
                };
                item.appendChild(img);
                item.appendChild(removeBtn);
                attachmentTray.appendChild(item);
            });
        }

        function clearPendingImages()
        {
            pendingImages = [];
            renderAttachmentTray();
        }

        function buildUserContent(text, images)
        {
            if (!images.length) return text;
            const parts = [];
            if (text) parts.push({ type: 'text', text });
            images.forEach((image) =>
            {
                parts.push({
                    type: 'image_url',
                    image_url: { url: image.dataUrl }
                });
            });
            return parts;
        }

        async function sendMessage()
        {
            const text = userInput.value.trim();
            const images = pendingImages.slice();
            const apiConfigs = getApiConfigs();

            if (!text && !images.length) return;
            if (!apiConfigs.length)
            {
                alert('请点击顶部设置填写 API Key，或添加多 API 轮询列表');
                if (!document.getElementById('settings-panel').classList.contains('show')) toggleSettings();
                return;
            }

            const userContent = buildUserContent(text, images);
            messageHistory.push({ role: 'user', content: userContent });
            appendMessage('user', userContent);
            persistConversation();

            userInput.value = '';
            userInput.style.height = '44px';
            previewArea.classList.remove('show');
            previewArea.innerHTML = '';
            clearPendingImages();

            const aiMessageDiv = appendMessage('assistant', '<span class="typing">思考中...</span>', { rawHtml: true });
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            let fullText = '';
            const errors = [];
            const startIndex = apiRoundRobinIndex % apiConfigs.length;

            try
            {
                for (let attempt = 0; attempt < apiConfigs.length; attempt++)
                {
                    const index = (startIndex + attempt) % apiConfigs.length;
                    const config = apiConfigs[index];
                    try
                    {
                        setStatus(`API ${index + 1}/${apiConfigs.length}`);
                        fullText = await requestChatCompletion(config, aiMessageDiv);
                        messageHistory.push({ role: 'assistant', content: fullText });
                        apiRoundRobinIndex = (index + 1) % apiConfigs.length;
                        localStorage.setItem(STORAGE_KEYS.apiIndex, String(apiRoundRobinIndex));
                        persistConversation();
                        aiMessageDiv.innerHTML = sanitizeHtml(renderMarkdown(fullText));
                        typesetElement(aiMessageDiv);
                        setStatus(`已使用 API ${index + 1}`, 'recording');
                        return;
                    } catch (error)
                    {
                        errors.push(`API ${index + 1}: ${error.message}`);
                    }
                }
                throw new Error(errors.join('；'));
            } catch (error)
            {
                aiMessageDiv.innerHTML = `<span style="color:#b91c1c">Error: ${escapeHtml(error.message)}</span>`;
                setStatus('请求失败');
            } finally
            {
                sendBtn.disabled = false;
            }
        }

        async function requestChatCompletion(config, targetDiv)
        {
            const response = await fetch(config.url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${config.key}`
                },
                body: JSON.stringify({
                    model: config.model || defaultModel,
                    messages: messageHistory,
                    stream: true
                })
            });

            if (!response.ok)
            {
                throw new Error(await readApiError(response));
            }

            if (!response.body)
            {
                const data = await response.json();
                return data.choices?.[0]?.message?.content || '';
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let fullText = '';

            while (true)
            {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split(/\r?\n/);
                buffer = lines.pop() || '';

                for (const rawLine of lines)
                {
                    const line = rawLine.trim();
                    if (!line || !line.startsWith('data:')) continue;
                    const jsonStr = line.slice(5).trim();
                    if (jsonStr === '[DONE]') return fullText;
                    try
                    {
                        const data = JSON.parse(jsonStr);
                        const content = data.choices?.[0]?.delta?.content || data.choices?.[0]?.message?.content || '';
                        if (content)
                        {
                            fullText += content;
                            targetDiv.textContent = fullText;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    } catch (err)
                    {
                        console.warn('跳过无法解析的流式片段:', jsonStr);
                    }
                }
            }

            return fullText;
        }

        async function readApiError(response)
        {
            const fallback = `HTTP ${response.status}`;
            try
            {
                const data = await response.json();
                return data.error?.message || data.message || fallback;
            } catch (err)
            {
                return fallback;
            }
        }

        function appendMessage(role, content, options = {})
        {
            const div = document.createElement('div');
            const cssRole = role === 'assistant' ? 'ai' : role;
            div.className = `message ${cssRole}`;
            if (options.rawHtml)
            {
                div.innerHTML = content;
            } else
            {
                div.innerHTML = renderMessageContent(role, content);
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            typesetElement(div);
            return div;
        }

        function renderMessageContent(role, content)
        {
            if (role === 'assistant')
            {
                return sanitizeHtml(renderMarkdown(String(content || '')));
            }

            if (role === 'system')
            {
                return escapeHtml(stringifyContent(content)).replace(/\n/g, '<br>');
            }

            const { text, images } = splitMessageContent(content);
            const textHtml = escapeHtml(text).replace(/\n/g, '<br>');
            const imagesHtml = images.length
                ? `<div class="message-images">${images.map((url, index) => `<img class="message-image" src="${escapeAttribute(url)}" alt="上传图片 ${index + 1}">`).join('')}</div>`
                : '';
            return `${textHtml}${imagesHtml}`;
        }

        function splitMessageContent(content)
        {
            if (typeof content === 'string') return { text: content, images: [] };
            const result = { text: '', images: [] };
            if (!Array.isArray(content)) return { text: String(content || ''), images: [] };
            content.forEach((part) =>
            {
                if (part?.type === 'text') result.text += part.text || '';
                if (part?.type === 'image_url')
                {
                    const url = typeof part.image_url === 'string' ? part.image_url : part.image_url?.url;
                    if (url) result.images.push(url);
                }
            });
            return result;
        }

        function stringifyContent(content)
        {
            if (typeof content === 'string') return content;
            const { text } = splitMessageContent(content);
            return text || JSON.stringify(content);
        }

        function renderMarkdown(text)
        {
            if (!window.marked) return escapeHtml(text).replace(/\n/g, '<br>');
            return marked.parse(text || '');
        }

        function sanitizeHtml(html)
        {
            const template = document.createElement('template');
            template.innerHTML = html;
            template.content.querySelectorAll('script, iframe, object, embed').forEach((node) => node.remove());
            template.content.querySelectorAll('*').forEach((node) =>
            {
                Array.from(node.attributes).forEach((attr) =>
                {
                    const name = attr.name.toLowerCase();
                    const value = attr.value.trim().toLowerCase();
                    if (name.startsWith('on') || value.startsWith('javascript:'))
                    {
                        node.removeAttribute(attr.name);
                    }
                });
            });
            return template.innerHTML;
        }

        function typesetElement(element)
        {
            if (!window.MathJax?.typesetPromise) return;
            renderPromise = renderPromise
                .then(() => MathJax.typesetPromise([element]))
                .then(() => { chatContainer.scrollTop = chatContainer.scrollHeight; })
                .catch((err) => console.warn('MathJax render error:', err));
        }

        async function syncToNutstore()
        {
            try
            {
                saveSettings();
                await putNutstoreFile(JSON.stringify(buildConversationPayload(), null, 2));
                setStatus('已同步到坚果云', 'recording');
                alert('已同步到坚果云');
            } catch (err)
            {
                console.error(err);
                setStatus('坚果云同步失败');
                alert('同步到坚果云失败: ' + formatNutstoreError(err));
            }
        }

        async function syncFromNutstore()
        {
            try
            {
                saveSettings();
                const text = await getNutstoreFile();
                const payload = JSON.parse(text);
                const messages = parseConversationPayload(payload);
                if (!messages.length) throw new Error('远端文件没有可加载的消息');
                restoreConversation(messages);
                setStatus('已从坚果云拉取', 'recording');
                alert(`已从坚果云拉取 ${messages.length} 条消息`);
            } catch (err)
            {
                console.error(err);
                setStatus('坚果云拉取失败');
                alert('从坚果云拉取失败: ' + formatNutstoreError(err));
            }
        }

        async function testNutstoreConnection()
        {
            try
            {
                saveSettings();
                const result = await checkNutstoreConnection();
                setStatus('坚果云连接正常', 'recording');
                alert(`坚果云连接正常：${result}`);
            } catch (err)
            {
                console.error(err);
                setStatus('坚果云连接失败');
                alert('坚果云连接失败: ' + formatNutstoreError(err));
            }
        }

        function scheduleAutoSync()
        {
            if (!document.getElementById('nutstore-auto').checked) return;
            const config = getNutstoreConfig();
            if (!config.url || !config.user || !config.pass || !config.path) return;
            clearTimeout(autoSyncTimer);
            autoSyncTimer = setTimeout(() =>
            {
                putNutstoreFile(JSON.stringify(buildConversationPayload(), null, 2))
                    .then(() => setStatus('已自动同步', 'recording'))
                    .catch((err) => console.warn('自动同步失败:', err));
            }, 1200);
        }

        function getNutstoreConfig()
        {
            return {
                url: normalizeNutstoreBaseUrl(document.getElementById('nutstore-url').value.trim() || defaultNutstoreUrl),
                user: document.getElementById('nutstore-user').value.trim(),
                pass: document.getElementById('nutstore-pass').value.trim(),
                path: document.getElementById('nutstore-path').value.trim() || defaultNutstorePath
            };
        }

        function normalizeNutstoreBaseUrl(url)
        {
            const trimmed = String(url || '').trim();
            if (!trimmed) return defaultNutstoreUrl;
            if (/^https?:\/\//i.test(trimmed)) return trimmed;
            return `http://${trimmed}`;
        }

        function getProxyNutstoreUrl()
        {
            const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
            return `${protocol}//${proxyNutstoreHost}${proxyNutstorePath}`;
        }

        function isDirectNutstoreUrl(url)
        {
            return normalizeNutstoreBaseUrl(url).replace(/\/+$/, '') === directNutstoreUrl.replace(/\/+$/, '');
        }

        function isLegacyProxyNutstoreUrl(url)
        {
            return normalizeNutstoreBaseUrl(url).replace(/\/+$/, '') === legacyProxyNutstoreUrl.replace(/\/+$/, '');
        }

        function buildNutstoreUrl(config, pathOverride)
        {
            const base = config.url.replace(/\/+$/, '');
            const path = (pathOverride || config.path).replace(/^\/+/, '');
            const encodedPath = path.split('/').map(encodeURIComponent).join('/');
            return `${base}/${encodedPath}`;
        }

        function getNutstoreHeaders(config)
        {
            if (!config.user || !config.pass)
            {
                throw new Error('请填写坚果云账号和应用密码');
            }
            return {
                Authorization: `Basic ${btoa(unescape(encodeURIComponent(`${config.user}:${config.pass}`)))}`
            };
        }

        async function ensureNutstoreFolders(config, headers)
        {
            const parts = config.path.replace(/^\/+/, '').split('/').filter(Boolean);
            parts.pop();
            let current = '';
            for (const part of parts)
            {
                current += `/${part}`;
                const response = await nutstoreFetch(buildNutstoreUrl(config, current), {
                    method: 'MKCOL',
                    headers
                }, '创建远端目录');
                if (![200, 201, 204, 405, 409].includes(response.status))
                {
                    throw await createNutstoreHttpError(response, '创建远端目录失败');
                }
            }
        }

        async function putNutstoreFile(content)
        {
            const config = getNutstoreConfig();
            const headers = getNutstoreHeaders(config);
            await ensureNutstoreFolders(config, headers);
            const response = await nutstoreFetch(buildNutstoreUrl(config), {
                method: 'PUT',
                headers: {
                    ...headers,
                    'Content-Type': 'application/json; charset=utf-8'
                },
                body: content
            }, '上传坚果云文件');
            if (!response.ok)
            {
                throw await createNutstoreHttpError(response, '上传坚果云文件失败');
            }
        }

        async function getNutstoreFile()
        {
            const config = getNutstoreConfig();
            const headers = getNutstoreHeaders(config);
            const response = await nutstoreFetch(buildNutstoreUrl(config), {
                method: 'GET',
                headers
            }, '读取坚果云文件');
            if (!response.ok)
            {
                throw await createNutstoreHttpError(response, '读取坚果云文件失败');
            }
            return response.text();
        }

        async function checkNutstoreConnection()
        {
            const config = getNutstoreConfig();
            const headers = getNutstoreHeaders(config);
            const folderPath = getNutstoreParentPath(config.path);
            const response = await nutstoreFetch(buildNutstoreUrl(config, folderPath), {
                method: 'PROPFIND',
                headers: {
                    ...headers,
                    Depth: '0',
                    'Content-Type': 'application/xml; charset=utf-8'
                },
                body: '<?xml version="1.0" encoding="utf-8"?><d:propfind xmlns:d="DAV:"><d:prop><d:resourcetype/></d:prop></d:propfind>'
            }, '检测坚果云连接');

            if ([200, 207, 301, 302].includes(response.status))
            {
                return `HTTP ${response.status}`;
            }
            if (response.status === 404)
            {
                return '账号可连接，同步目录尚不存在，推送时会尝试创建';
            }
            throw await createNutstoreHttpError(response, '检测坚果云连接失败');
        }

        function getNutstoreParentPath(path)
        {
            const parts = path.replace(/^\/+/, '').split('/').filter(Boolean);
            parts.pop();
            return parts.length ? `/${parts.join('/')}` : '/';
        }

        async function nutstoreFetch(url, options, action)
        {
            if (window.location.protocol === 'https:' && /^http:\/\//i.test(url))
            {
                const error = new Error(`${action}失败：当前页面是 HTTPS，但中转服务器地址是 HTTP。`);
                error.isMixedContent = true;
                throw error;
            }

            try
            {
                return await fetch(url, options);
            } catch (err)
            {
                const error = new Error(`${action}失败：浏览器无法访问坚果云 WebDAV。`);
                error.cause = err;
                error.isNetworkBlocked = true;
                throw error;
            }
        }

        async function createNutstoreHttpError(response, message)
        {
            let detail = '';
            try
            {
                detail = (await response.text()).replace(/\s+/g, ' ').trim().slice(0, 160);
            } catch (err)
            {
                detail = '';
            }

            const error = new Error(`${message}: HTTP ${response.status}${detail ? ` ${detail}` : ''}`);
            error.status = response.status;
            return error;
        }

        function formatNutstoreError(err)
        {
            if (err?.isMixedContent)
            {
                return `${err.message} 浏览器会拦截 HTTPS 页面访问 HTTP 接口。请给 zihancai.top 配置 HTTPS，或把页面也部署在同一个 HTTP 源上测试。`;
            }

            if (err?.isNetworkBlocked || err?.cause instanceof TypeError || /failed to fetch/i.test(err?.message || ''))
            {
                return '浏览器无法连接 zihancai.top 的 WebDAV 中转服务。请确认 nginx 反代正在运行、域名解析正确、已允许 CORS/OPTIONS、地址为 /dav/，并且防火墙放行了对应端口。';
            }

            if (err?.status === 401 || err?.status === 403)
            {
                return `${err.message}。请检查坚果云账号和“第三方应用密码”，不是登录密码。`;
            }

            if (err?.status === 404)
            {
                return `${err.message}。远端文件不存在，可以先使用“同步到坚果云”创建。`;
            }

            return err?.message || String(err);
        }

        function setupMcpBridge()
        {
            window.MathChatMCP = {
                version: '1.0.0',
                tools: [
                    'chat.export',
                    'chat.import',
                    'chat.list',
                    'chat.load',
                    'chat.delete',
                    'chat.new',
                    'chat.clear',
                    'nutstore.test',
                    'nutstore.pull',
                    'nutstore.push',
                    'config.get',
                    'config.setNutstore',
                    'config.useNutstoreProxy'
                ],
                async call(method, params = {})
                {
                    switch (method)
                    {
                        case 'chat.export':
                            return buildConversationPayload();
                        case 'chat.import':
                            restoreConversation(parseConversationPayload(params.payload || params.messages || []));
                            return { ok: true, count: messageHistory.length };
                        case 'chat.list':
                            return getSavedConversations().map((item) => ({
                                id: item.id,
                                title: item.title,
                                createdAt: item.createdAt,
                                updatedAt: item.updatedAt,
                                count: item.messages.length,
                                active: item.id === currentConversationId
                            }));
                        case 'chat.load':
                            loadSavedConversation(params.id);
                            return { ok: true, count: messageHistory.length };
                        case 'chat.delete':
                            deleteSavedConversation(params.id);
                            return { ok: true };
                        case 'chat.new':
                            newConversation();
                            return { ok: true, id: currentConversationId };
                        case 'chat.clear':
                            messageHistory = [];
                            persistConversation();
                            renderGreeting();
                            return { ok: true };
                        case 'nutstore.test':
                            return { ok: true, result: await checkNutstoreConnection() };
                        case 'nutstore.pull':
                            await syncFromNutstore();
                            return { ok: true, count: messageHistory.length };
                        case 'nutstore.push':
                            await syncToNutstore();
                            return { ok: true, count: messageHistory.length };
                        case 'config.get':
                            return {
                                apiCount: getApiConfigs().length,
                                nutstore: { ...getNutstoreConfig(), pass: getNutstoreConfig().pass ? '***' : '' }
                            };
                        case 'config.setNutstore':
                            if (params.url) document.getElementById('nutstore-url').value = params.url;
                            if (params.user) document.getElementById('nutstore-user').value = params.user;
                            if (params.pass) document.getElementById('nutstore-pass').value = params.pass;
                            if (params.path) document.getElementById('nutstore-path').value = params.path;
                            saveSettings();
                            return { ok: true };
                        case 'config.useNutstoreProxy':
                            useNutstoreProxy();
                            return { ok: true, url: proxyNutstoreUrl };
                        default:
                            throw new Error(`Unknown MCP method: ${method}`);
                    }
                },
                async handle(request)
                {
                    const id = request?.id ?? null;
                    try
                    {
                        const result = await this.call(request.method, request.params || {});
                        return { jsonrpc: '2.0', id, result };
                    } catch (err)
                    {
                        return { jsonrpc: '2.0', id, error: { code: -32000, message: err.message } };
                    }
                }
            };
        }

        function debounce(func, wait)
        {
            let timeout;
            return function (...args)
            {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function escapeHtml(text)
        {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttribute(text)
        {
            return escapeHtml(text).replace(/`/g, '&#096;');
        }

        function formatShortTime(value)
        {
            const date = value ? new Date(value) : new Date();
            if (Number.isNaN(date.getTime())) return '未知时间';
            const now = new Date();
            const sameYear = date.getFullYear() === now.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return sameYear
                ? `${month}-${day} ${hour}:${minute}`
                : `${date.getFullYear()}-${month}-${day}`;
        }
